<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WCAG — Guía de Accesibilidad Web</title>
  <meta name="description" content="Guía interactiva de criterios WCAG con ejemplos de buenas y malas prácticas, filtros por nivel, principio y versión." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&display=swap"
    rel="stylesheet"
  />

  <!-- CSS — orden importa -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/table.css" />
</head>
<body>

  <!-- SKIP LINK (accesibilidad: salta la nav al contenido) -->
  <a class="skip-link" href="#main-content">Saltar al contenido principal</a>

  <!-- SLOTS — cada div se rellena via fetch() en loader.js -->
  <div id="slot-header"></div>

  <main id="main-content">
    <div id="slot-criterios"></div>
    <div id="slot-formulario"></div>
    <div id="slot-recursos"></div>
  </main>

  <div id="slot-footer"></div>

  <!--
    ORDEN DE SCRIPTS — importante:
    1. wcag-criteria.js  → define la constante global WCAG_CRITERIA
    2. filters.js        → lee WCAG_CRITERIA, renderiza filas, maneja filtros
    3. form.js           → maneja el formulario de contacto
    4. loader.js         → fetch de secciones HTML, llama a initFilters() e initForm()
  -->
  <script src="data/wcag-criteria.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/form.js"></script>
  <script src="js/loader.js"></script>

</body>
</html>
